[custom.docker_always]
description = "Show Docker icon only (no text) in Docker projects"
# We still run a command to check if docker is available, but we won't print the result
command = "docker -v" 
# Only show if a docker file exists in the current folder
when = """ test -f Dockerfile || test -f docker-compose.yml || test -f docker-compose.yaml || test -f compose.yml || test -f compose.yaml """
style = "blue bold"
# Notice we removed $output here so the word 'default' is hidden
format = "[$symbol]($style) "
symbol = "¾░Ī© "

